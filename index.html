<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAQLIV Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        .custom-cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            background: url('./


custom_cursor.png') no-repeat center center;
            background-size: contain;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }

      body:not(.touch-device) { cursor: none !important; }

/* FORCE CUSTOM CURSOR ON ALL CLICKABLE ELEMENTS */
button, a, input, [role="button"], .badge, .social-icon, .profile-picture, 
.theme-button, .player-btn, .player-progress, .player-volume-slider, 
.player-heart, .visitor-counter, .badge-container, svg, .profile-container {
    cursor: none !important;
    pointer-events: auto;
}

        body {
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100vh;
            position: relative;
            background: transparent !important;
            backdrop-filter: none !important;
            box-shadow: none !important;
        }

        #background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
            pointer-events: none;
        }

        .glitch-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.5s;
        }

        #hacker-overlay, #snow-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 3;
        }

        .hidden { display: none !important; }

        /* THEME BUTTONS — centered below profile block, larger */
        .controls {
            position: fixed;
            top: calc(50% + 100px);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
            z-index: 20;
            background: transparent !important;
            padding: 8px 12px;
            border-radius: 20px;
            backdrop-filter: none !important;
            box-shadow: none !important;
        }

        .theme-button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.28);
            background-color: transparent !important;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
            font-size: 13px;
            font-weight: bold;
            box-shadow: none !important;
            backdrop-filter: none !important;
            color: rgba(255,255,255,0.65);
        }

        .theme-button:hover {
            transform: scale(1.18);
            border-color: rgba(255, 255, 255, 0.85);
            color: #fff;
        }

        .slider {
            -webkit-appearance: none;
            appearance: none;
            width: 80px;
            height: 5px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
        }

        /* PROFILE BLOCK — balanced position with 3D perspective */
        #profile-block {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 820px;
            min-height: 332px;
            background: transparent !important;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 15px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 15px;
            backdrop-filter: none !important;
            box-shadow: none !important;
            opacity: 0;
            transform-style: preserve-3d;
            transition: transform 0.5s ease-out;
            pointer-events: auto;
            margin-top: -100px;
            perspective: 1200px;
        }

        .profile-header { display: flex; align-items: flex-start; gap: 15px; }

        .profile-container { position: relative; width: 150px; height: 150px; }

        .profile-container::after {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 50%;
            background: radial-gradient(circle at 10px 10px, var(--primary-color, #00CED1) 10%, transparent 15%);
            animation: orbit 3s linear infinite;
            z-index: -1;
            filter: blur(1px);
            box-shadow: none;
        }

        .profile-container.fast-orbit::after { animation: fast-orbit 0.5s linear forwards; }

        .profile-picture {
            width: 150px; height: 150px;
            border-radius: 50%; object-fit: cover;
            cursor: pointer; pointer-events: auto; opacity: 1 !important;
        }

        .profile-info { flex: 1; display: flex; flex-direction: column; }

        .name-and-badges { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }

        @font-face {
            font-family: 'Angel Wish';
            src: url('./https://archive.org/download/kai-hii-kehde-assets/


Angel_wish.ttf') format('truetype');
        }

        #profile-name {
            font-family: 'Angel Wish', sans-serif;
            font-size: 32px; font-weight: bold; letter-spacing: 3px; color: #fff;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.7));
            opacity: 1 !important;
            display: flex; align-items: center; gap: 6px;
        }

        .verified-badge { width: 16px; height: 16px; display: inline-block; vertical-align: middle; }

        .badge-group { display: flex; flex-wrap: wrap; gap: 8px; }

        .badge-container { position: relative; pointer-events: auto; opacity: 1 !important; }

        .badge-container .tooltip {
            visibility: hidden;
            width: 120px;
            background: transparent !important;
            color: #fff; text-align: center;
            border-radius: 6px; padding: 5px 0;
            position: absolute; z-index: 100;
            bottom: 125%; left: 50%; margin-left: -60px;
            opacity: 0; transition: opacity 0.3s;
            backdrop-filter: none !important; box-shadow: none !important;
            text-shadow: 0 0 6px #000;
        }

        .badge-container:hover .tooltip { visibility: visible; opacity: 1 !important; }

        .badge-box { background: transparent !important; padding: 2px; border-radius: 15px; display: inline-block; backdrop-filter: none !important; box-shadow: none !important; }

        .badge-box-inner { background: transparent !important; padding: 5px; border-radius: 12px; display: flex; gap: 8px; box-shadow: none !important; backdrop-filter: none !important; }

        .badge { width: 22px; height: 22px; transition: transform 0.3s; pointer-events: auto; opacity: 1 !important; }
        .badge:hover { transform: scale(1.2); }

        /* Bio — subtle glow */
        #profile-bio {
            color: rgba(255,255,255,0.8);
            font-size: 18px; line-height: 1.5;
            margin-bottom: 10px; opacity: 1 !important;
            text-shadow: 0 0 6px rgba(255,255,255,0.15);
        }

        .bio-separator { width: 100%; height: 1px; background: rgba(255,255,255,0.2); margin: 20px 0; opacity: 1 !important; }

        .profile-footer { display: flex; flex-direction: column; gap: 5px; width: 100%; margin-top: auto; }

        .visitor-counter {
            display: flex; align-items: center; gap: 8px;
            background: transparent !important;
            padding: 8px 15px; border-radius: 20px; font-size: 14px;
            align-self: flex-start; position: relative;
            pointer-events: auto; opacity: 1 !important;
            backdrop-filter: none !important; box-shadow: none !important;
            text-shadow: 0 0 6px #000;
        }

        .visitor-icon { width: 18px; height: 18px; color: white; opacity: 1 !important; }

        .visitor-counter .tooltip {
            visibility: hidden; width: 120px;
            background: transparent !important; color: #fff; text-align: center;
            border-radius: 6px; padding: 5px 0;
            position: absolute; z-index: 100;
            top: -35px; left: 50%; margin-left: -60px;
            opacity: 0; transition: opacity 0.3s;
            backdrop-filter: none !important; box-shadow: none !important;
            text-shadow: 0 0 6px #000;
        }

        .visitor-counter:hover .tooltip { visibility: visible; opacity: 1 !important; }
        #visitor-count { opacity: 1 !important; }

        .social-links {
            display: flex; justify-content: center; gap: 12px;
            margin-top: 0; pointer-events: auto; opacity: 1 !important;
        }

        .social-icon {
            width: 36px; height: 36px;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.7));
            pointer-events: auto; opacity: 1 !important;
        }

        .social-icon:hover { transform: scale(1.4) rotateY(15deg); }

        /* SKILLS BLOCK */
        #skills-block {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 820px; min-height: 332px;
            background: transparent !important;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 20px; border-radius: 15px;
            z-index: 20; display: flex; flex-direction: column; gap: 15px;
            backdrop-filter: none !important; box-shadow: none !important;
            transform-style: preserve-3d; transition: transform 0.5s ease-out;
            margin-top: -100px;
            perspective: 1200px;
        }

        .skills-title { text-align: center; font-size: 24px; margin-bottom: 15px; }
        .skill { display: flex; flex-direction: column; gap: 5px; }
        .skill-name { display: flex; justify-content: space-between; align-items: center; }
        .skill-icon { width: 22px; height: 22px; margin-right: 8px; }
        .skill-bar-container { height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; }
        .skill-bar { height: 100%; border-radius: 5px; width: 0%; transition: width 2s; }
        #python-bar { background: linear-gradient(90deg, #ff6b6b, #ff9f9f); }
        #cpp-bar    { background: linear-gradient(90deg, #4facfe, #00f2fe); }
        #csharp-bar { background: linear-gradient(90deg, #43e97b, #38f9d7); }

        #results-button-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 20; }

        #results-theme {
            background: transparent !important; color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 15px; border-radius: 20px;
            cursor: pointer; font-family: 'Courier New', monospace; font-size: 14px;
            backdrop-filter: none !important; box-shadow: none !important; transition: all 0.3s;
        }

        #results-theme:hover { background: transparent !important; border-color: rgba(255,255,255,0.8); }

        #results-hint {
            position: absolute; background: transparent !important; color: white;
            padding: 8px 12px; border-radius: 10px; font-size: 12px;
            width: 180px; text-align: center; pointer-events: none; z-index: 25;
            backdrop-filter: none !important; box-shadow: none !important;
            border: 1px solid rgba(255,255,255,0.2); text-shadow: 0 0 6px #000;
        }

        /* Theme border colors */
        .home-theme  #profile-block, .home-theme  #skills-block { border-color: rgba(0,195,255,0.5); }
        .hacker-theme #profile-block,.hacker-theme #skills-block {  border-color: rgba(0,255,0,0.5); }
        .rain-theme  #profile-block, .rain-theme  #skills-block  { border-color: rgba(100,149,237,0.5); }
        .anime-theme #profile-block, .anime-theme #skills-block  { border-color: rgba(255,0,255,0.5); }
        .car-theme   #profile-block, .car-theme   #skills-block  { border-color: rgba(255,165,0,0.5); }

        .glitch { animation: glitch 0.2s ease-in-out; }

        @keyframes glitch {
            0%   { transform: translate(0); }
            20%  { transform: translate(-2px, 2px); }
            40%  { transform: translate(-2px, -2px); }
            60%  { transform: translate(2px, 2px); }
            80%  { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        @keyframes orbit { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fast-orbit { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .cursor-trail { position: fixed; pointer-events: none; z-index: 9999; }
        .cursor-trail-dot {
            position: absolute; width: 6px; height: 6px;
            background-color: rgba(255,255,255,0.8); border-radius: 50%;
            transform: translate(-50%,-50%); transition: opacity 0.3s ease;
        }

        #start-screen {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100vh;
            background: #000; backdrop-filter: none !important;
            display: flex; align-items: center; justify-content: center;
            z-index: 30; cursor: pointer;
        }

        #start-text { font-family: 'Courier New', monospace; font-size: 24px; color: #fff; text-align: center; }

        /* =========================================================
           MUSIC PLAYER — LONGER AND BIGGER WITH LARGER BUTTONS
           + 3D TILT ANIMATION ON MOUSEMOVE
        ========================================================= */
        .music-player {
            position: fixed;
            top: calc(50% + 155px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 26;
            width: 680px;
            border-radius: 14px;
            background: transparent !important;
            border: 1px solid rgba(255,255,255,0.14);
            backdrop-filter: none !important;
            box-shadow: none !important;
            pointer-events: auto;
            overflow: hidden;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transform-style: preserve-3d;
            transition: transform 0.3s ease-out;
            perspective: 1200px;
        }

        /* Horizontal player main section */
        .music-player .player-inner {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        /* Album art — left side, slightly larger */
        .music-player .player-image {
            width: 72px;
            height: 72px;
            object-fit: cover;
            flex: 0 0 72px;
            display: block;
            border-radius: 9px;
        }

        /* Middle content — track name + progress */
        .music-player .player-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
            gap: 7px;
        }

        /* Track name + heart */
        .music-player .player-top-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }

        .music-player .player-track-name {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.93);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 0 6px rgba(255,255,255,0.15), 0 0 4px #000;
            letter-spacing: 0.25px;
            flex: 1;
            min-width: 0;
        }

        .music-player .player-heart {
            font-size: 12px;
            color: rgba(255,255,255,0.35);
            cursor: pointer;
            transition: color 0.2s, transform 0.18s;
            flex: 0 0 auto;
            line-height: 1;
            user-select: none;
        }

        .music-player .player-heart.liked { color: #ff6b9e; }
        .music-player .player-heart:hover { transform: scale(1.35); color: #ff6b9e; }

        /* Progress bar */
        .music-player .player-progress {
            position: relative;
            height: 4px;
            border-radius: 4px;
            background: rgba(255,255,255,0.16);
            overflow: hidden;
            cursor: pointer;
        }

        .music-player .player-progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 4px;
            background: rgba(255,255,255,0.82);
            transition: width 0.1s linear;
        }

        /* Time display */
        .music-player .player-time {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 9px;
            color: rgba(255,255,255,0.38);
            font-family: 'Courier New', monospace;
            letter-spacing: 0.15px;
            line-height: 1;
        }

        .music-player .player-time-sep { color: rgba(255,255,255,0.2); }

        /* Right side — controls buttons - BIGGER */
        .music-player .player-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 0 0 auto;
        }

        .music-player .player-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            padding: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.18s, transform 0.18s;
            line-height: 1;
            font-size: 11px;
        }

        .music-player .player-btn:hover {
            color: rgba(255,255,255,0.95);
            transform: scale(1.2);
        }

        /* Play/pause circle - BIGGER */
        .music-player .player-btn.player-play {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.32) !important;
            background: transparent !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
            color: rgba(255,255,255,0.88);
            font-size: 11px;
        }

        .music-player .player-btn.player-play:hover {
            border-color: rgba(255,255,255,0.85) !important;
            background: rgba(255,255,255,0.06) !important;
            transform: scale(1.12);
        }

        /* VOLUME CONTROL — below, full width */
        .music-player .player-volume-section {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .music-player .player-volume-icon {
            width: 16px;
            height: 16px;
            color: rgba(255,255,255,0.48);
            flex: 0 0 auto;
            cursor: pointer;
            transition: color 0.2s;
        }

        .music-player .player-volume-icon:hover {
            color: rgba(255,255,255,0.85);
        }

        .music-player .player-volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            border-radius: 4px;
            background: rgba(255,255,255,0.2);
            outline: none;
            cursor: pointer;
            flex: 1;
        }

        .music-player .player-volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: rgba(255,255,255,0.8);
            cursor: pointer;
            transition: background 0.2s;
        }

        .music-player .player-volume-slider::-moz-range-thumb {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: rgba(255,255,255,0.8);
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }

        .music-player .player-volume-slider:hover::-webkit-slider-thumb {
            background: rgba(255,255,255,0.95);
        }

        .music-player .player-volume-slider:hover::-moz-range-thumb {
            background: rgba(255,255,255,0.95);
        }

        /* ── Mobile ── */
        @media (max-width: 430px) {
            #profile-block, #skills-block {
                width: 90vw; max-width: 350px; min-height: 280px; padding: 15px;
                top: 50%; left: 50%; transform: translate(-50%, -50%);
                margin-top: -80px;
            }

            .profile-header { flex-direction: column; align-items: center; gap: 10px; }
            .profile-container { width: 120px; height: 120px; }
            .profile-picture { width: 120px; height: 120px; }
            .profile-info { align-items: center; text-align: center; }
            .name-and-badges { flex-direction: column; align-items: center; gap: 8px; }
            #profile-name { font-size: 24px; letter-spacing: 2px; }
            .verified-badge { width: 14px; height: 14px; }
            .badge-group { justify-content: center; gap: 6px; }
            .badge { width: 18px; height: 18px; }
            .badge-container .tooltip { width: 100px; font-size: 12px; margin-left: -50px; bottom: 110%; }
            #profile-bio { font-size: 14px; line-height: 1.4; }
            .bio-separator { margin: 15px 0; }
            .social-links { gap: 10px; justify-content: center; }
            .social-icon { width: 32px; height: 32px; }
            .visitor-counter { font-size: 12px; padding: 6px 12px; align-self: center; }
            .visitor-icon { width: 16px; height: 16px; }
            .visitor-counter .tooltip { width: 100px; font-size: 12px; margin-left: -50px; top: -30px; }
            .skills-title { font-size: 18px; margin-bottom: 10px; }
            .skill-icon { width: 18px; height: 18px; }
            .skill-name span { font-size: 14px; }

            .controls {
                top: calc(50% + 90px);
                left: 50%;
                transform: translateX(-50%);
                gap: 12px;
            }

            .theme-button { width: 32px; height: 32px; font-size: 12px; }

            #results-button-container { top: 10px; }
            #results-theme { padding: 6px 12px; font-size: 12px; }
            #results-hint { width: 150px; font-size: 10px; padding: 6px 10px; }
            #start-text { font-size: 18px; padding: 0 20px; }

            .music-player {
                top: calc(50% + 145px);
                width: calc(100vw - 20px);
                max-width: 680px;
                padding: 10px;
            }

            .music-player .player-image { width: 64px; height: 64px; }
            .music-player .player-btn.player-play { width: 28px; height: 28px; font-size: 10px; }
            .music-player .player-volume-slider { width: 100%; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Retro+Gaming&display=swap" rel="stylesheet">
</head>

<div class="custom-cursor"></div>

<div id="start-screen">
    <div id="start-text"></div>
</div>

<div class="container">

    <video id="background" autoplay loop muted playsinline webkit-playsinline>

background.mp4" type="video/mp4">

    <div class="glitch-overlay"></div>
    <div id="hacker-overlay" class="hidden"></div>

    <!-- MAIN PROFILE BLOCK — balanced position with 3D perspective -->
    <div id="profile-block" class="card">

<!-- Enhanced Player Functionality with Integrated Volume + 3D Tilt Animation -->
<script>
(function () {
    function fmt(s) {
        if (!s || isNaN(s) || s === Infinity) return '0:00';
        const m = Math.floor(s / 60), sec = Math.floor(s % 60);
        return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    function hookAudio(audio) {
        const cur  = document.getElementById('player-current-time');
        const tot  = document.getElementById('player-total-time');
        if (!cur || !tot) return;
        audio.addEventListener('timeupdate',    () => { cur.textContent = fmt(audio.currentTime); tot.textContent = fmt(audio.duration); });
        audio.addEventListener('loadedmetadata',() => { tot.textContent = fmt(audio.duration); });
    }

    document.addEventListener('DOMContentLoaded', () => {
        const defaultAudio = document.getElementById('background-music');
        if (defaultAudio) hookAudio(defaultAudio);

        // Seek functionality
        const bar = document.getElementById('player-progress-bar');
        if (bar) {
            bar.addEventListener('click', (e) => {
                const audio = document.getElementById(document.getElementById('music-player').dataset.audioId);
                if (!audio) return;
                const rect = bar.getBoundingClientRect();
                const pct  = (e.clientX - rect.left) / rect.width;
                if (audio.duration && !isNaN(audio.duration)) audio.currentTime = pct * audio.duration;
            });
        }

        // Heart like functionality
        const heart = document.getElementById('player-heart');
        if (heart) heart.addEventListener('click', () => heart.classList.toggle('liked'));

        // Prev — restart track
        const prev = document.getElementById('player-prev');
        if (prev) prev.addEventListener('click', () => {
            const a = document.getElementById(document.getElementById('music-player').dataset.audioId);
            if (a) a.currentTime = 0;
        });

        // Next — skip ahead 30s
        const next = document.getElementById('player-next');
        if (next) next.addEventListener('click', () => {
            const a = document.getElementById(document.getElementById('music-player').dataset.audioId);
            if (a && a.duration) a.currentTime = Math.min(a.currentTime + 30, a.duration);
        });

        // INTEGRATED VOLUME CONTROL
        const playerVolumeSlider = document.getElementById('player-volume-slider');
        const playerVolumeIcon = document.getElementById('player-volume-icon');
        
        if (playerVolumeSlider && playerVolumeIcon) {
            playerVolumeSlider.addEventListener('input', () => {
                const audio = document.getElementById(document.getElementById('music-player').dataset.audioId);
                if (audio) {
                    audio.volume = playerVolumeSlider.value;
                    audio.muted = false;
                }
            });

            playerVolumeIcon.addEventListener('click', () => {
                const audio = document.getElementById(document.getElementById('music-player').dataset.audioId);
                if (audio) {
                    audio.muted = !audio.muted;
                    playerVolumeIcon.style.opacity = audio.muted ? '0.3' : '1';
                }
            });
        }

        // 3D TILT ANIMATION FOR MUSIC PLAYER (same as profile block)
        const musicPlayer = document.getElementById('music-player');
        if (musicPlayer) {
            musicPlayer.addEventListener('mousemove', (e) => {
                const rect = musicPlayer.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const mouseX = e.clientX - centerX;
                const mouseY = e.clientY - centerY;

                const maxTilt = 12;
                const tiltX = (mouseY / rect.height) * maxTilt;
                const tiltY = -(mouseX / rect.width) * maxTilt;

                gsap.to(musicPlayer, {
                    rotationX: tiltX,
                    rotationY: tiltY,
                    duration: 0.3,
                    ease: 'power2.out',
                    transformPerspective: 1000,
                    overwrite: 'auto'
                });
            });

            musicPlayer.addEventListener('mouseleave', () => {
                gsap.to(musicPlayer, {
                    rotationX: 0,
                    rotationY: 0,
                    duration: 0.5,
                    ease: 'power2.out',
                    overwrite: 'auto'
                });
            });
        }
    });
})();
</script>
